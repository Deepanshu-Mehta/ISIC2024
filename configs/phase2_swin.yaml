seed: 42

data:
  raw_dir: data/raw/isic-2024-challenge
  train_file: train-metadata.csv
  target_col: target
  patient_col: patient_id

image:
  hdf5_path: data/raw/isic-2024-challenge/train-image.hdf5
  size: 256
  normalize_mean: [0.485, 0.456, 0.406]
  normalize_std: [0.229, 0.224, 0.225]

augment:
  hflip_p: 0.5
  vflip_p: 0.5
  rotate90_p: 0.5
  transpose_p: 0.5
  color_jitter_p: 0.5
  brightness_limit: 0.2
  contrast_limit: 0.2
  saturation_limit: 0.2
  hue_limit: 0.1
  gaussian_blur_p: 0.3
  blur_limit: 7
  coarse_dropout_p: 0.3
  num_holes_max: 8
  hole_height_max: 32
  hole_width_max: 32

sampler:
  neg_pos_ratio: 50
  replacement: true

model:
  backbone: swinv2_base_window12to16_192to256.ms_in22k_ft_in1k
  pretrained: true
  drop_rate: 0.3
  num_classes: 1

loss:
  name: focal
  gamma: 2.0
  alpha: 0.25

optimizer:
  name: adamw
  lr_backbone: 5.0e-5
  lr_head: 5.0e-4
  weight_decay: 1.0e-2
  scheduler: onecycle
  max_lr_backbone: 5.0e-5
  max_lr_head: 5.0e-4
  pct_start: 0.1

train:
  epochs: 25
  batch_size: 32
  num_workers: 4
  precision: "16-mixed"
  accumulate_grad_batches: 2
  patience: 3
  save_top_k: 3
  fast_dev_run: false

wandb:
  project: isic2024-phase2
  enabled: true

cv:
  n_splits: 5
  seed: 42
