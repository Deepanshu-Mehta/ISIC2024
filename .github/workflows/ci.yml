name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # -----------------------------------------------------------------------
  # 1. Lint + unit tests (CPU-only, Phase 1 deps)
  # -----------------------------------------------------------------------
  test:
    name: Lint & Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package + test deps
        run: pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check src/ tests/

      - name: Ruff format check
        run: ruff format --check src/ tests/

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

  # -----------------------------------------------------------------------
  # 2. Docker build smoke test (verifies Dockerfile + gallery data intact)
  # -----------------------------------------------------------------------
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t isic2024-demo:ci .

      - name: Smoke test — import app without launching server
        run: |
          docker run --rm isic2024-demo:ci python -c "
          import json, pathlib
          gallery = json.loads((pathlib.Path('gallery/gallery.json')).read_text())
          assert len(gallery) == 8, f'Expected 8 gallery cases, got {len(gallery)}'
          print(f'Gallery OK: {len(gallery)} cases')
          import app  # ensure app.py parses and GALLERY_DATA loads
          print(f'App import OK: {len(app.GALLERY_DATA)} cases loaded')
          "
