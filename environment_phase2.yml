name: isic2024
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - numpy>=1.24
  - pandas>=2.0
  - scikit-learn>=1.3
  - matplotlib>=3.7
  - seaborn>=0.12
  - scipy>=1.10
  - pyyaml>=6.0
  - jupyterlab>=4.0
  - ipykernel
  - pip
  - pip:
      # Phase 1 — tabular
      - lightgbm>=4.0
      - xgboost>=2.0
      - catboost>=1.2
      - optuna>=3.3
      - shap>=0.43
      - loguru>=0.7
      - ruff>=0.1
      - mypy>=1.5
      - pytest>=7.4
      # Phase 2 — deep learning on images
      # For CUDA on remote GPUs, add: --extra-index-url https://download.pytorch.org/whl/cu121
      - torch>=2.1
      - torchvision>=0.16
      - lightning>=2.2
      - timm>=1.0
      - wandb>=0.16
      - albumentations>=1.4    # pulls opencv-python-headless automatically
      - h5py>=3.10
